<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TINT Intro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f7f9fc;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: min(680px, 92%);
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }
    p {
      margin: 8px 0;
      line-height: 1.6;
      color: #4b5563;
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    .btn:hover {
      background: #1d4ed8;
    }
    .link {
      display: block;
      margin-top: 12px;
      font-size: 0.95rem;
      color: #2563eb;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>TINT Research Group</h1>
    <p><strong>TINT</strong> stands for <em>Trustworthy Internet of Intelligence</em>.</p>
    <p>
      This page is a simple introduction card with a direct link to the official TINT website.
      Click the button below to visit the site.
    </p>

    <a class="btn" href="https://tint-research.com/" target="_blank" rel="noopener noreferrer">
      Visit TINT Website
    </a>

    <a class="link" href="https://tint-research.com/" target="_blank" rel="noopener noreferrer">
      https://tint-research.com/
    </a>
  </main>
</body>
</html>
